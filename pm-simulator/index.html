<title>Rocket Landing — a PM decision simulator</title>
<style>
/* ============ RESET ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font:inherit;color:inherit}
img,svg{display:block}
table{border-collapse:collapse}
/* ============ TOKENS (DESIGN-SPEC §2) ============ */
:root{
  --paper-0:#FBFAF7;--paper-1:#FFFFFF;--paper-2:#F2EFE8;
  --ink-900:#191C1F;--ink-700:#3E444B;--ink-500:#5C636B;
  --line:#E4E0D6;--line-strong:#C8C3B6;
  --brand-050:#FDEEE3;--brand-600:#C2410C;--brand-700:#9A3412;--brand-800:#7C2D12;
  --loss-050:#FBEAE8;--loss-700:#B3261E;--gain-050:#E7F3EA;--gain-700:#166534;
  --clock-050:#FFF3DB;--clock-300:#F2C879;--clock-800:#6E4400;
  --clock-hot-050:#FBE3CB;--clock-hot-800:#7A3306;
  --chatbar:#262B31;--bubble-in:#FFFFFF;--bubble-note:#FFF9DB;--ops-bg:#E8EFE3;
  --sky-a:#D9E6F2;--sky-b:#F6F1E4;--cabin:#EDF0F3;
  --cream:#F7F3EA;--cream-card:#FDFBF5;--debrief-rule:#D8D0BE;
  --bar-fill:#2F343A;--bar-empty:#E7E1D2;
  --focus:#2563EB;--scrim:rgba(25,28,31,0.45);
  --font-ui:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans",sans-serif;
  --font-data:ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  --font-serif:Charter,"Bitstream Charter","Noto Serif",Georgia,Cambria,serif;
  --fs-11:0.6875rem;--fs-12:0.75rem;--fs-13:0.8125rem;--fs-14:0.875rem;--fs-15:0.9375rem;
  --fs-16:1rem;--fs-18:1.125rem;--fs-21:1.3125rem;--fs-26:1.625rem;--fs-32:2rem;
  --lh-tight:1.2;--lh-ui:1.45;--lh-body:1.55;--lh-read:1.7;--track-caps:0.08em;
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--sp-10:40px;--sp-12:48px;
  --r-chip:6px;--r-card:12px;--r-sheet:16px;--r-device:28px;--r-pill:999px;
  --shadow-flat:0 1px 0 rgba(25,28,31,0.07);
  --shadow-sun:0 2px 0 rgba(25,28,31,0.10),0 10px 24px -18px rgba(25,28,31,0.45);
  --shadow-overlay:0 8px 40px -8px rgba(25,28,31,0.40);
  --t-fast:120ms;--t-base:200ms;--t-phase:320ms;--t-clock:450ms;--t-exhale:700ms;
  --ease-out:cubic-bezier(0.16,1,0.3,1);--ease-inout:cubic-bezier(0.65,0,0.35,1);
  --tap-min:44px;
}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper-0);color:var(--ink-900);font-family:var(--font-ui);font-size:var(--fs-15);line-height:var(--lh-ui);transition:background var(--t-exhale)}
body.exhale{background:var(--cream)}
:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:inherit}
.vh{position:absolute!important;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
/* ============ SHELL ============ */
.stagewrap{display:block}
main.stage{width:100%;max-width:680px;margin-inline:auto;padding-inline:var(--sp-4)}
.phase-out{opacity:0;transform:translateY(-8px);transition:opacity var(--t-base) var(--ease-inout),transform var(--t-base) var(--ease-inout)}
.phase-in{animation:phasein var(--t-phase) var(--ease-out) both}
@keyframes phasein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.slide-out{opacity:0;transform:translateX(-24px);transition:opacity var(--t-base) var(--ease-inout),transform var(--t-base) var(--ease-inout)}
.slide-in{animation:slidein var(--t-phase) var(--ease-out) both}
@keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
.clipx{overflow-x:clip}
.kicker{font-size:var(--fs-11);text-transform:uppercase;letter-spacing:var(--track-caps);color:var(--ink-500);font-weight:600;font-family:var(--font-ui)}
.mono{font-family:var(--font-data);font-variant-numeric:tabular-nums}
/* ============ DAY BAR §3.1 ============ */
.daybar{position:sticky;top:0;z-index:40;height:52px;display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);padding-inline:var(--sp-4);background:rgba(251,250,247,0.97);border-bottom:1px solid var(--line-strong);transition:border-color 600ms}
.daybar.dark-edge{border-bottom-color:var(--ink-900)}
.daybar-inner{display:contents}
.logo-btn{display:flex;align-items:center;gap:var(--sp-2);background:none;border:0;cursor:pointer;min-height:44px;min-width:44px;border-radius:var(--r-chip)}
.logo-tile{width:32px;height:32px;border-radius:var(--r-chip);background:var(--brand-600);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui)}
.wordmark{font-size:var(--fs-14);font-weight:700;color:var(--ink-900)}
.meter{display:flex;flex-direction:column;align-items:center;gap:2px}
.dots{display:flex;align-items:center;gap:var(--sp-2)}
.dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--line-strong);flex:none}
.dot.sq{border-radius:2px}
.dot.cur{border-color:var(--ink-900)}
.pipsep{width:1px;height:12px;background:var(--line-strong);margin-inline:var(--sp-2);flex:none}
.dot.on{background:var(--ink-900);border-color:var(--ink-900);animation:dotpop 250ms var(--ease-out)}
@keyframes dotpop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.moves{font-size:var(--fs-11);text-transform:uppercase;letter-spacing:var(--track-caps);color:var(--ink-500)}
.clockchip{display:inline-flex;align-items:center;gap:6px;height:36px;padding-inline:var(--sp-3);border-radius:var(--r-pill);background:var(--clock-050);border:1px solid var(--clock-300);color:var(--clock-800);font-family:var(--font-data);font-size:var(--fs-16);font-weight:600;font-variant-numeric:tabular-nums;transition:background 300ms,color 300ms,border-color 300ms}
.clockchip.hot{background:var(--clock-hot-050);color:var(--clock-hot-800);border-color:rgba(122,51,6,0.4)}
.clockchip.locked{background:var(--ink-900);color:var(--paper-0);border-color:transparent}
.clockchip.washing{animation:wash 600ms}
.clockchip.hot.washing{animation:washhot 600ms}
@keyframes wash{0%{background:var(--clock-050)}50%{background:#FFE9B8}100%{background:var(--clock-050)}}
@keyframes washhot{0%{background:var(--clock-hot-050)}50%{background:#F8D4AE}100%{background:var(--clock-hot-050)}}
.timeslot{position:relative;overflow:hidden;height:1.3em;line-height:1.3}
.timeslot .tstack{display:flex;flex-direction:column;transition:transform var(--t-clock) var(--ease-inout)}
.timeslot .tstack.rolled{transform:translateY(-1.3em)}
.daybar-right{display:flex;align-items:center;gap:var(--sp-2)}
.restart-btn{width:44px;height:44px;border-radius:50%;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-700);flex:none}
.restart-btn:active{background:var(--paper-2)}
@media(hover:hover){.restart-btn:hover{background:var(--paper-2)}}
.restart-btn.corner{position:fixed;top:calc(56px + env(safe-area-inset-top,0px));right:calc(8px + env(safe-area-inset-right,0px));z-index:41;background:var(--paper-0);border:1px solid var(--line-strong);box-shadow:var(--shadow-flat)}
.hub-btn{width:44px;height:44px;border-radius:50%;border:0;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-700);flex:none}
.hub-btn:active{background:var(--paper-2)}
@media(hover:hover){.hub-btn:hover{background:var(--paper-2)}}
.hub-btn.corner{position:fixed;top:calc(56px + env(safe-area-inset-top,0px));left:calc(8px + env(safe-area-inset-left,0px));z-index:41;background:var(--paper-0);border:1px solid var(--line-strong);box-shadow:var(--shadow-flat)}
/* ============ BUTTONS §3.3 ============ */
.btn-primary{display:inline-flex;align-items:center;justify-content:center;height:48px;border-radius:var(--r-pill);background:var(--brand-700);color:#fff;font-size:var(--fs-16);font-weight:700;padding-inline:var(--sp-6);border:0;cursor:pointer;font-family:var(--font-ui)}
.btn-primary:active:not(:disabled){background:var(--brand-800);transform:translateY(1px)}
.btn-primary:disabled{background:var(--paper-2);color:var(--ink-500);cursor:default;box-shadow:none}
.btn-primary.compact{height:44px}
.btn-primary.full{width:100%}
.btn-primary.ink{background:var(--ink-900)}
.btn-quiet{display:inline-flex;align-items:center;justify-content:center;min-height:44px;border-radius:var(--r-pill);background:transparent;border:1px solid var(--line-strong);color:var(--ink-700);font-size:var(--fs-15);font-weight:600;padding-inline:var(--sp-4);cursor:pointer;font-family:var(--font-ui)}
/* pressed states */
.btn-quiet:active{background:var(--paper-2);transform:translateY(1px)}
.rcard:active{background:var(--paper-2)}
.notif:active{background:var(--paper-2)}
.inboxrow:active{background:var(--paper-2)}
.notestab:active{background:var(--paper-2)}
.sheetclose:active{background:var(--paper-2)}
.logo-btn:active{transform:scale(0.96)}
.btn-quiet.borderless{border:0;font-size:var(--fs-13);color:var(--ink-500);font-weight:600}
@media(hover:hover){
  .btn-primary:hover:not(:disabled){background:var(--brand-600)}
  .btn-primary.ink:hover{background:#2F343A}
  .btn-quiet:hover{background:var(--paper-2)}
  .mcard:hover{border-color:var(--ink-700);box-shadow:var(--shadow-sun)}
  .notif.cta:hover{box-shadow:var(--shadow-sun)}
}
/* ============ HUB — CASE FILES §4 ============ */
.hubwrap{padding-block:var(--sp-8) var(--sp-10)}
.hubhead{margin-bottom:var(--sp-6)}
.hubkicker{font-size:var(--fs-12);font-weight:700;letter-spacing:var(--track-caps);text-transform:uppercase;color:var(--brand-700)}
.hubtitle{font-family:var(--font-serif);font-size:var(--fs-26);color:var(--ink-900);margin-top:var(--sp-1)}
.hubsub{font-size:var(--fs-15);line-height:var(--lh-read);color:var(--ink-700);margin-top:var(--sp-2);max-width:52ch}
.dossier-grid{display:grid;grid-template-columns:1fr;gap:var(--sp-4);margin-top:var(--sp-6)}
@media(min-width:620px){.dossier-grid{grid-template-columns:1fr 1fr}}
.dossier-card{background:var(--paper-1);border:1px solid var(--line-strong);border-radius:var(--r-card);box-shadow:var(--shadow-flat);padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-2)}
.dossier-top{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2)}
.dossier-tile{width:32px;height:32px;border-radius:var(--r-chip);background:var(--brand-600);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--font-ui);flex:none}
.dossier-diff{font-size:var(--fs-11);font-weight:700;letter-spacing:var(--track-caps);text-transform:uppercase;color:var(--ink-500)}
.dossier-company{font-family:var(--font-serif);font-size:var(--fs-18);color:var(--ink-900);margin-top:var(--sp-1)}
.dossier-hook{font-size:var(--fs-14);line-height:var(--lh-ui);color:var(--ink-700)}
.dossier-state{display:inline-flex;align-items:center;gap:4px;border-radius:var(--r-chip);padding:2px 8px;font-family:var(--font-data);font-size:var(--fs-13);font-weight:700;align-self:flex-start;margin-top:var(--sp-1)}
.dossier-state.new{background:var(--brand-050);color:var(--brand-700)}
.dossier-state.played{background:var(--gain-050);color:var(--gain-700)}
.dossier-card .dossier-cta{margin-top:var(--sp-3);width:100%}
.dossier-card.locked{background:var(--paper-2);border-style:dashed}
.dossier-num{font-size:var(--fs-11);font-weight:700;letter-spacing:var(--track-caps);text-transform:uppercase;color:var(--ink-500)}
.dossier-lockline{display:flex;align-items:center;gap:6px;font-size:var(--fs-13);color:var(--ink-500);margin-top:var(--sp-2)}
.hubcta{margin-top:var(--sp-10)}
/* ============ INTRO — ORIENTATION §4.0 ============ */
.orientwrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:var(--sp-4);background:linear-gradient(180deg,var(--sky-a) 0%,var(--sky-b) 70%)}
.orientcard{width:100%;max-width:420px;background:var(--paper-1);border:1px solid var(--line-strong);border-radius:var(--r-card);box-shadow:var(--shadow-flat);padding:var(--sp-6)}
.orienthead{font-size:var(--fs-18);font-weight:700;color:var(--ink-900)}
.orientcard p{font-size:var(--fs-15);line-height:var(--lh-read);margin-top:var(--sp-3)}
.orientcard .btn-primary{margin-top:var(--sp-5);min-height:var(--tap-min)}
.orientsmall{font-size:var(--fs-12);color:var(--ink-500);margin-top:var(--sp-3)}
@media(max-width:479.9px){.orientcard .btn-primary{width:100%}}
/* ============ INTRO — PHONE §4.1 ============ */
.introwrap{min-height:100vh;min-height:100dvh}
.phone{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.speaker{display:none}
@media(min-width:768px){
  .introwrap{display:flex;justify-content:center;align-items:center;padding-block:var(--sp-8)}
  .phone{width:400px;height:min(760px,92vh);min-height:0;border-radius:var(--r-device);border:1px solid var(--line-strong);box-shadow:var(--shadow-sun);position:relative;background:var(--paper-0);transition:width 450ms var(--ease-inout),border-radius 450ms var(--ease-inout),border-color 450ms var(--ease-inout)}
  .phone.dissolve{width:680px;border-radius:var(--r-card);border-color:transparent}
  .speaker{display:block;position:absolute;top:14px;left:50%;transform:translateX(-50%);width:96px;height:4px;border-radius:2px;background:var(--line-strong);z-index:2}
}
@media(max-height:480px){.phone{overflow-y:auto}}
.lock{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--sky-a) 0%,var(--sky-b) 70%)}
.statusstrip{display:flex;justify-content:space-between;align-items:center;padding:var(--sp-4);font-size:var(--fs-12);color:var(--ink-500)}
.statusicons{display:flex;gap:6px;align-items:center;color:var(--ink-500)}
.bigclock{text-align:center;margin-top:14%}
.bigclock .t{font-family:var(--font-data);font-size:var(--fs-32);font-weight:300;color:var(--ink-900);font-variant-numeric:tabular-nums;transition:opacity 200ms}
.bigclock .d{font-size:var(--fs-14);color:var(--ink-700);margin-top:var(--sp-1)}
@media(min-width:768px){.bigclock .t{font-size:40px}}
.notifstack{margin-top:auto;display:flex;flex-direction:column;gap:var(--sp-2);padding:var(--sp-4)}
.notif{background:rgba(255,255,255,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:var(--r-card);padding:var(--sp-3) var(--sp-4);box-shadow:var(--shadow-flat);min-height:64px;text-align:left;animation:drop 300ms var(--ease-out) both}
@supports not (backdrop-filter:blur(8px)){.notif{background:#F4F2EC}}
@keyframes drop{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes notifglow{0%,100%{box-shadow:var(--shadow-flat)}50%{box-shadow:var(--shadow-sun)}}
.notif .nrow1{display:flex;align-items:center;gap:6px;font-size:var(--fs-12);color:var(--ink-500);margin-bottom:var(--sp-1)}
.notif .nrow1 .src{font-weight:600}
.notif .nrow1 .ntime{font-family:var(--font-data)}
.notif .nbody{font-size:var(--fs-14);line-height:var(--lh-ui);color:var(--ink-900);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notif.cta{border:0;cursor:pointer;width:100%;position:relative;padding-right:var(--sp-8);animation:drop 300ms var(--ease-out) both,notifglow 2600ms var(--ease-inout) 300ms infinite}
.notif.cta:active{transform:scale(0.98)}
.notif.cta .chev{position:absolute;right:var(--sp-3);top:50%;transform:translateY(-50%);color:var(--ink-500)}
.appicon{width:20px;height:20px;border-radius:5px;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none}
.appicon.disc{border-radius:50%}
.hint{align-self:center;margin:0 auto var(--sp-3);opacity:0;transition:opacity 400ms}
.hint.show{opacity:1}
/* ============ INTRO — CHAT §4.2 ============ */
.chatapp{flex:1;display:flex;flex-direction:column;background:var(--paper-0);min-height:0}
.chattop{height:52px;flex:none;background:var(--chatbar);color:#fff;display:flex;align-items:center;justify-content:space-between;padding-inline:var(--sp-4)}
.chattop .ch{display:flex;align-items:center;gap:6px;font-size:var(--fs-15);font-weight:700}
.avcluster{display:flex}
.avcluster span{width:20px;height:20px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-6px;border:1.5px solid var(--chatbar)}
.chatbody{flex:1;overflow-y:auto;padding:var(--sp-4);min-height:0}
.datediv{display:flex;align-items:center;gap:var(--sp-3);margin-block:var(--sp-3)}
.datediv::before,.datediv::after{content:"";flex:1;height:1px;background:var(--line)}
.datediv span{font-size:var(--fs-11);text-transform:uppercase;letter-spacing:var(--track-caps);color:var(--ink-500)}
.composer{flex:none;padding:var(--sp-3) var(--sp-4) var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3)}
.fakeinput{background:var(--paper-1);border:1px solid var(--line-strong);border-radius:var(--r-card);height:44px;display:flex;align-items:center;padding-inline:var(--sp-4);color:var(--ink-500);font-size:var(--fs-14);cursor:not-allowed;opacity:.7}
/* ============ CHAT GROUP §5.2 ============ */
.group{display:flex;gap:var(--sp-3);margin-block:var(--sp-3)}
.group .gcol{flex:1;min-width:0;display:flex;flex-direction:column;gap:var(--sp-1)}
.avatar{width:36px;height:36px;border-radius:50%;color:#fff;font-size:var(--fs-13);font-weight:700;display:flex;align-items:center;justify-content:center;flex:none}
.avatar.sm{width:32px;height:32px}
.namerow{display:flex;align-items:baseline;gap:var(--sp-2);flex-wrap:wrap}
.namerow .nm{font-size:var(--fs-14);font-weight:700;color:var(--ink-900);pointer-events:none}
.roletag{font-size:var(--fs-11);text-transform:uppercase;letter-spacing:var(--track-caps);padding:1px 6px;border-radius:var(--r-chip);background:var(--paper-2);color:var(--ink-700);font-weight:600;pointer-events:none}
.namerow .tm{font-size:var(--fs-12);font-family:var(--font-data);color:var(--ink-500);pointer-events:none}
.bubble{background:var(--bubble-in);border:1px solid var(--line);border-radius:var(--r-card);padding:var(--sp-3) var(--sp-4);font-size:var(--fs-15);line-height:var(--lh-body);color:var(--ink-900);max-width:100%;overflow-wrap:break-word}
.gcol .bubble:first-of-type{border-top-left-radius:4px}
.bubble p+p{margin-top:var(--sp-2)}
.bubble.pop{animation:bpop 180ms var(--ease-out) both}
@keyframes bpop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.typing{display:inline-flex;gap:4px;padding:var(--sp-3) var(--sp-4);background:var(--bubble-in);border:1px solid var(--line);border-radius:var(--r-card);border-top-left-radius:4px;width:max-content}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--ink-500);animation:tpulse 1.1s infinite}
.typing i:nth-child(2){animation-delay:0.2s}
.typing i:nth-child(3){animation-delay:0.4s}
@keyframes tpulse{0%,100%{opacity:0.3}50%{opacity:1}}
/* ============ SHEETS ============ */

<script>
'use strict';
/* Set after Apps Script deploy — see WAITLIST-SETUP.md */
const WAITLIST_URL = "https://script.google.com/macros/s/AKfycbxYTKpBvFV-r365Ccfgu9eBJi4_lteF51H29nX31D9VXSNpVmUxZZQ19JtXxVKA8d0aFw/exec";

/*SCORE-START*/
function computeScore(picks, decision, framing){
  var pickScore = 0;
  for (var i=0;i<picks.length;i++) pickScore += SC().pts[picks[i]];
  var informed = picks.indexOf('A1')>=0 || picks.indexOf('A2')>=0 || picks.indexOf('A3')>=0 || picks.indexOf('A5')>=0;
  var decisionScore;
  if (decision === 'D2') decisionScore = informed ? 5 : 1;
  else decisionScore = {D1:3,D3:1,D4:2,D5:0}[decision];
  var framingMod = {F1:3,F4:1,F2:0,F3:-2}[framing];
  var total = pickScore + decisionScore + framingMod;
  var band = total >= 15 ? 'A' : (total >= 8 ? 'B' : 'C');
  return {pickScore:pickScore, decisionScore:decisionScore, framingMod:framingMod, total:total, band:band, informed:informed};
}
function computeDims(picks, decision, framing){
  var sc = computeScore(picks, decision, framing);
  function clamp(v){ return Math.max(1, Math.min(5, v)); }
  function count(ids){ var n=0; for (var i=0;i<ids.length;i++) if (picks.indexOf(ids[i])>=0) n++; return n; }
  var ps = sc.pickScore;
  var logical = ps<=2?1:ps<=5?2:ps<=8?3:ps<=11?4:5;
  var data = [1,2,3,4,5][count(['A1','A5','A11','A8'])];
  var traps = count(['A6','A9','A12']);
  var assumption = [5,3,2,1][traps];
  var d2informed = decision==='D2' && sc.informed;
  var risk = d2informed?5 : decision==='D1'?4 : decision==='D4'?3 : decision==='D3'?2 : decision==='D2'?2 : 1;
  var sharps = count(['A1','A2','A3','A5','A11']);
  var prior = [1,2,3,4,5][sharps];
  var stake = 3 + (framing==='F1'?1:framing==='F3'?-2:framing==='F2'?-1:0) + (picks.indexOf('A6')>=0?-1:0);
  stake = clamp(stake);
  var empathy = picks.indexOf('A2')>=0?5 : (picks.indexOf('A11')>=0||picks.indexOf('A7')>=0)?3 : 2;
  var biz = clamp((sc.decisionScore>=3?4:2) + (framing==='F2'?-1:0) + (d2informed?1:0));
  var comm = framing==='F1'?5:framing==='F4'?3:framing==='F2'?2:1;
  return [logical, data, assumption, risk, prior, stake, empathy, biz, comm];
}
/*SCORE-END*/

/* ---------- helpers ---------- */

  clockSm:'<svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 4.5V8l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',

  chevU:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="m3 10 5-5 5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',

  phone:'<svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 2.5c0 6 4.5 10.5 10.5 10.5l1-2.5-3-1.5-1.5 1.5C8 9.5 6.5 8 5.5 6l1.5-1.5L5.5 1.5 3 2.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>',
  status:'<svg width="40" height="12" viewBox="0 0 40 12" fill="currentColor" aria-hidden="true"><rect x="0" y="7" width="2" height="4" rx="1"/><rect x="3.5" y="5" width="2" height="6" rx="1"/><rect x="7" y="3" width="2" height="8" rx="1"/><path d="M14 8a5.5 5.5 0 0 1 8 0l-1.4 1.4a3.5 3.5 0 0 0-5.2 0Z"/><circle cx="18" cy="10.6" r="1.2"/><rect x="26" y="3.5" width="11" height="6" rx="1.6" fill="none" stroke="currentColor"/><rect x="27.5" y="5" width="6" height="3" rx="0.8"/><rect x="37.6" y="5.4" width="1.6" height="2.4" rx="0.8"/></svg>',
  restart:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M12.5 8A4.5 4.5 0 1 1 10.8 4.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M10.3 2.2 10.9 5.1 8 5.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  grid:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>'
};
function chip(kind, glyph, text, sr){
  return '<span class="chip '+kind+'">'+(glyph?SVG[glyph]:'')+'<span>'+text+'</span>'+(sr?'<span class="vh"> '+sr+'</span>':'')+'</span>';
}
/* ---------- state ---------- */
var SCENARIO_ID = 's01'; /* set by hub/boot before renderPhase(); default s01 for direct deep-link */
function SC(){ return window.PMSIM && window.PMSIM.scenarios[SCENARIO_ID]; }
function skeyFor(id){ return 'pmsim-' + id; }
var SKEY = skeyFor(SCENARIO_ID);
var SLATE = [
  {id:'s01', difficulty:'First week'},
  {id:'s02', difficulty:'First week'},
  {id:'s03', difficulty:'Trial by fire'},
  {id:'s04', difficulty:'Trial by fire'},
  {id:'s05', difficulty:'The deep end'}
];
var S;
function defState(){ return {phase:'intro', sub:'orient', picks:[], decision:null, framing:null, read:['anurag'], saw1p:false, joined:false, debriefed:false}; }
function load(){
  try{ var raw = localStorage.getItem(SKEY); if(!raw) return null;
    var s = JSON.parse(raw);
    if (!s || typeof s.phase !== 'string' || !Array.isArray(s.picks)) return null;
    return s;
  }catch(e){ return null; }
}
function save(){ try{ localStorage.setItem(SKEY, JSON.stringify(S)); }catch(e){} }
function resetState(){ try{ localStorage.removeItem(SKEY); }catch(e){} S = defState(); }
/* ---------- progress (cross-scenario, survives resetState) + anonymous analytics ---------- */
var PKEY = 'pmsim-progress';
/* Set after Apps Script deploy — see ANALYTICS-SETUP.md. Empty = no-op, no console error. */
var ANALYTICS_URL = "";
function loadProgress(){
  try{
    var raw = localStorage.getItem(PKEY);
    var p = raw ? JSON.parse(raw) : null;
    if (!p || typeof p !== 'object' || typeof p.cases !== 'object' || !p.cases) return {v:1, cases:{}, joined:false};
    return {v:1, cases:p.cases, joined:!!p.joined};
  }catch(e){ return {v:1, cases:{}, joined:false}; }
}
function saveProgress(p){ try{ localStorage.setItem(PKEY, JSON.stringify(p)); }catch(e){} }
function markJoined(){
  var p = loadProgress();
  if (p.joined) return;
  p.joined = true;
  saveProgress(p);
}
/* records one completed play (best-of), fires the anonymous analytics beacon, returns the updated case entry */
function recordCompletion(scenarioId, sc, dims){
  var p = loadProgress();
  var prev = p.cases[scenarioId];
  var isNewBest = !prev || sc.total > prev.best;
  p.cases[scenarioId] = {
    best: isNewBest ? sc.total : prev.best,
    band: isNewBest ? sc.band : prev.band,
    plays: (prev ? prev.plays : 0) + 1,
    last: { score: sc.total, band: sc.band, ts: new Date().toISOString() }
  };
  saveProgress(p);
  if (ANALYTICS_URL){
    fetch(ANALYTICS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ scenario: scenarioId, score: sc.total, band: sc.band, dims: dims, ts: new Date().toISOString() })
    })['catch'](function(){});
  }
  return p.cases[scenarioId];
}
/* ---------- fiction constants ---------- */
function clockNow(){
  if (S.phase==='boardroom') return '10:58 AM';
  if (S.phase==='decision' || S.picks.length>=4) return SC().times[4];
  return SC().times[S.picks.length];
}
function avatar(p, sm){ return '<span class="avatar'+(sm?' sm':'')+'" style="background:'+p.c+'" aria-hidden="true">'+p.a+'</span>'; }
function groupHTML(p, time, bubbles, opts){

  for (var i=0;i<bubbles.length;i++) bs += '<div class="bubble'+(opts.pop?' pop':'')+'"'+(opts.pop?' style="animation-delay:'+(i*90)+'ms"':'')+'>'+bubbles[i]+'</div>';
  return '<div class="group">'+avatar(p)+'<div class="gcol"><div class="namerow"><span class="nm">'+name+'</span><span class="roletag">'+p.r+'</span><span class="tm">'+time+'</span></div>'+bs+'</div></div>';

/* typed reveal of a chat group: typing indicator 900ms then bubbles pop (RM: instant) */
function typeIn(container, html, done){
  if (RM){ container.insertAdjacentHTML('beforeend', html); if(done) done(); return; }
  var t = h('<div class="group"><span class="avatar" style="background:transparent" aria-hidden="true"></span><div class="gcol"><div class="typing" aria-hidden="true"><i></i><i></i><i></i></div></div></div>');
  container.appendChild(t);
  setTimeout(function(){
    t.remove();
    var node = h(html);
    var bubbles = node.querySelectorAll('.bubble');
    for (var i=0;i<bubbles.length;i++){ bubbles[i].classList.add('pop'); bubbles[i].style.animationDelay = (i*90)+'ms'; }
    container.appendChild(node);
    if (done) setTimeout(done, bubbles.length*90+220);
  }, 900);
}
/* ---------- sheet manager (focus trap, Esc, focus return) ---------- */
var sheetState = null;
function openSheet(opts){
  closeSheet(true);
  var ov = $('#overlay');
  var scrim = h('<div class="scrim"></div>');
  var sheet = h('<div class="sheet '+(opts.cls||'')+'" role="dialog" aria-modal="true" aria-label="'+opts.label+'"></div>');
  if (opts.brandband) sheet.appendChild(h('<div class="brandband"></div>'));
  if (!opts.noHandle) sheet.appendChild(h('<div class="sheethandle" aria-hidden="true"></div>'));
  if (opts.titleRow){
    var tr = h('<div class="sheettitle"><span class="st">'+opts.titleRow+'</span></div>');
    var cb = h('<button class="sheetclose" aria-label="Close">'+SVG.x+'</button>');
    cb.addEventListener('click', function(){ closeSheet(); });
    tr.appendChild(cb); sheet.appendChild(tr);
  }
  var body = h('<div class="sheetbody"></div>');
  body.appendChild(opts.content);
  sheet.appendChild(body);
  if (opts.footer) sheet.appendChild(opts.footer);
  ov.appendChild(scrim); ov.appendChild(sheet);
  var returnTo = document.activeElement;
  function onKey(e){
    if (e.key==='Escape' && opts.dismissable !== false){ e.preventDefault(); closeSheet(); }
    if (e.key==='Tab'){
      var f = sheet.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])');
      if (!f.length) return;
      var first=f[0], last=f[f.length-1];
      if (e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
  }
  document.addEventListener('keydown', onKey);
  if (opts.dismissable !== false) scrim.addEventListener('click', function(){ closeSheet(); });
  sheetState = {scrim:scrim, sheet:sheet, onKey:onKey, returnTo:returnTo, onClose:opts.onClose};
  /* Auto-focus target must be safe: the titleRow close button (unchanged
     behavior) or an explicit text input. Sheets with neither (e.g. the
     one-pager, which only has a footer CTA) must NOT auto-focus an
     actionable button — doing so raced the sheet's mount/scroll on real
     devices and could leave the CTA's first tap silently swallowed. Focus
     the sheet container itself instead: it's still a valid a11y focus
     target (role=dialog) without triggering any action. */
  if (opts.titleRow){
    var focusable = sheet.querySelector('.sheetclose');
    if (focusable) focusable.focus();
  } else {
    var typeInput = sheet.querySelector('input');
    if (typeInput) typeInput.focus();
    else { sheet.setAttribute('tabindex','-1'); sheet.focus(); }
  }
}
function closeSheet(silent){
  if (!sheetState) return;
  var st = sheetState; sheetState = null;
  document.removeEventListener('keydown', st.onKey);
  st.scrim.remove(); st.sheet.remove();
  if (!silent){
    if (st.onClose) st.onClose();
    if (st.returnTo && st.returnTo.focus && document.contains(st.returnTo)) st.returnTo.focus();
  }
}

var LOCKED_PREMISE = {

function dossierCardHTML(item){

    var cp = loadProgress().cases['s01'];

function rollClock(){
  var chip = $('#clockchip'); if (!chip) return;
  var t = clockNow();
  var stack = $('#tstack');
  var moves = 4 - S.picks.length;
  var announce = function(){
    var lv = $('#clocklive');
    if (lv) lv.textContent = t + (S.picks.length<4 ? ' — '+moves+(moves===1?' move':' moves')+' left' : ' — menu locked');
  };
  var finish = function(){
    var isHot = t===SC().times[3], isLocked = t===SC().times[4] || t==='10:58 AM';
    chip.classList.toggle('hot', isHot);
    chip.classList.toggle('locked', isLocked);
    $('#clockglyph').innerHTML = isLocked ? SVG.lock : SVG.clock;
    if (isLocked){
      var db = $('#daybar'); if (db){ db.classList.add('dark-edge'); setTimeout(function(){ db.classList.remove('dark-edge'); }, 600); }
    }
    announce();
  };
  refreshMeter();
  if (RM){ stack.innerHTML = '<span>'+t+'</span>'; finish(); return; }
  stack.appendChild(h('<span>'+t+'</span>'));
  chip.classList.add('washing');
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ stack.classList.add('rolled'); }); });
  setTimeout(function(){
    stack.classList.remove('rolled');
    stack.innerHTML = '<span>'+t+'</span>';
    chip.classList.remove('washing');
    buzz(10);
    finish();
  }, 470);
}

function playReveal(id, idx, done){
  var region = $('#revealregion');
  var m = SC().menu.byId[id];
  var node = revealNode(id, idx, false);
  var fin = function(){
    var hd = node.querySelector('.rvh'); if (hd) hd.focus({preventScroll:true});
    if (done) done();
  };
  if (RM){ region.appendChild(node); fin(); return; }
  if (m.skin==='chat' || m.skin==='call'){
    var t = m.skin==='call'
      ? h('<div class="sysline" aria-hidden="true">Calling…</div>')
      : h('<div class="group" aria-hidden="true"><span class="avatar" style="background:transparent"></span><div class="gcol"><div class="typing"><i></i><i></i><i></i></div></div></div>');
    region.appendChild(t);
    t.scrollIntoView({behavior:'smooth', block:'center'});
    setTimeout(function(){
      t.remove();
      var bubbles = node.querySelectorAll('.bubble');
      for (var i=0;i<bubbles.length;i++){ bubbles[i].classList.add('pop'); bubbles[i].style.animationDelay=(i*90)+'ms'; }
      staggerRows(node);
      node.classList.add('rise');
      region.appendChild(node);
      node.scrollIntoView({behavior:'smooth', block:'start'});
      setTimeout(fin, bubbles.length*90+260);
    }, 900);
  } else {
    var quotes = node.querySelectorAll('.ticket, .opsbubble');
    for (var q=0;q<quotes.length;q++){ quotes[q].style.animation='cardrise 240ms var(--ease-out) both'; quotes[q].style.animationDelay=(120+q*60)+'ms'; }
    staggerRows(node);
    node.classList.add('rise');
    region.appendChild(node);
    node.scrollIntoView({behavior:'smooth', block:'start'});
    setTimeout(fin, 320+quotes.length*60);
  }
}

  out += '</div>';
  /* dimensions */
  out += '<div class="dimswrap"><div class="kicker">Nine dimensions of the morning</div>';
  for (var d=0;d<9;d++){
    var v = dims[d], segs='';
    for (var s2=0;s2<5;s2++) segs += '<span class="seg'+(s2<v?' fill':'')+'"></span>';
    out += '<div class="dimrow" role="meter" aria-valuemin="1" aria-valuemax="5" aria-valuenow="'+v+'" aria-labelledby="dlbl'+d+'">'+
      '<span class="dlbl" id="dlbl'+d+'">'+DIM_LABELS[d]+'</span>'+
      '<span class="segs" aria-hidden="true">'+segs+'</span>'+
      '<span class="dval" aria-hidden="true">'+v+'/5</span></div>';
  }
  out += '<p class="dimnote"><em>Different paths through this scenario can score high on different dimensions — there is no single correct route, and more than one route reaches “Board-ready”.</em></p></div>';
  /* waitlist CTA */
  out += '<div class="ctacard"><h2>That was one Monday. The job is hundreds of them.</h2>'+
    '<div class="cbody">Scenario 02 is already in the writers’ room — a pricing decision at a Bengaluru SaaS startup where every stakeholder is right and the runway isn’t. Join the waitlist and it lands in your inbox the day it ships.</div>'+
    '<form class="ctaform" id="ctaform" novalidate>'+
    '<input type="email" id="ctaemail" name="email" autocomplete="email" placeholder="you@example.com" aria-label="Email address" required>'+
    '<button class="btn-primary" type="submit" id="ctabtn">Get Scenario 02 →</button></form>'+
    '<div class="ctaerr" id="ctaerr" role="alert" hidden>That email didn’t go through — try again?</div>'+
    '<div class="ctamicro">Free. No spam — one email per scenario.</div></div>';
  /* footer */
  out += SC().debrief.footerHtml;
  out += '</section>';
  $('#stage').innerHTML = out;
  wireCTA();
  wireShare('sharebtn','shareconf','debrief');
  /* score count-up + band reveal; RM = instant, no haptic */
  if (!RM){
    (function(){
      var sn = $('#scorenum'), bandsec = $('#bandsec'), N = sc.total;
      setTimeout(function(){
        var t0 = null;
        function tick(ts){
          if (t0 === null) t0 = ts;
          var p = Math.min(1, (ts - t0) / 700);
          var e2 = 1 - Math.pow(1 - p, 3);
          sn.textContent = String(Math.floor(e2 * N));
          if (p < 1) requestAnimationFrame(tick); else sn.textContent = String(N);
        }
        requestAnimationFrame(tick);
      }, 250);
      setTimeout(function(){
        bandsec.classList.remove('prereveal');
        buzz([12,80,24]);
      }, 1150);
    })();
  }
  /* segment fill: staggered left-to-right per row; RM = instant */
  var rows = document.querySelectorAll('.dimrow');
  for (var r=0;r<rows.length;r++){
    (function(row, ri){
      var fills = row.querySelectorAll('.seg.fill'), val = row.querySelector('.dval');
      if (RM){
        for (var f=0;f<fills.length;f++) fills[f].classList.add('lit');
        val.classList.add('lit');
        return;
      }
      for (var f2=0;f2<fills.length;f2++){
        (function(el, fi){ setTimeout(function(){ el.classList.add('lit'); }, 400 + ri*90 + fi*70); })(fills[f2], f2);
      }
      setTimeout(function(){ val.classList.add('lit'); }, 400 + ri*90 + 5*70);
    })(rows[r], r);
  }
}
function wireCTA(){
  var form = $('#ctaform');
  if (!form) return;
  form.addEventListener('submit', function(e){
    e.preventDefault();
    var inp = $('#ctaemail'), btn = $('#ctabtn'), err = $('#ctaerr');
    var email = inp.value.replace(/^\s+|\s+$/g,'');
    function fail(){
      err.hidden = false;
      inp.setAttribute('aria-invalid','true');
      inp.setAttribute('aria-describedby','ctaerr');
      btn.disabled = false;
      btn.textContent = 'Get Scenario 02 →';
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) || !WAITLIST_URL){ fail(); return; }
    err.hidden = true;
    inp.removeAttribute('aria-invalid');
    btn.disabled = true;
    btn.textContent = 'Joining…';
    fetch(WAITLIST_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ email: email, ts: new Date().toISOString(), src: 'scenario-01' })
    }).then(function(){
      buzz(18);
      markJoined();
      form.outerHTML = '<div class="ctasuccess" role="status">You’re on the list. See you next Monday.</div>';
    })['catch'](fail);
  });
}
/* ==== SECTION:SHARE ==== */
function shareText(kind){
  if (kind === 'debrief'){
    var sc = computeScore(S.picks, S.decision, S.framing);
    var label = SC().debrief.bands.title[sc.band].replace(/\.$/, '');
    return 'I scored '+sc.total+'/20 — '+label+' — in Rocket Landing, a playable PM simulator. One tense Monday morning, no right answers. Think you’d land it? '+SC().share.url;
  }
  return 'Rocket Landing — a playable PM simulator. One tense Monday morning at a startup, misleading signals, no right answers. 10 minutes, free, in your browser. '+SC().share.url;
}
var shareConfirmTimer = null;
function showShareConfirm(el){
  if (!el) return;
  el.hidden = false;
  if (shareConfirmTimer) clearTimeout(shareConfirmTimer);
  shareConfirmTimer = setTimeout(function(){ el.hidden = true; }, 2600);
}
function copyShareText(text, confirmEl){
  function legacy(){
    try{
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly','');
      ta.style.position = 'fixed';
      ta.style.top = '-200px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }catch(e){}
    showShareConfirm(confirmEl);
  }
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ showShareConfirm(confirmEl); })['catch'](legacy);
  } else legacy();
}
function wireShare(btnId, confirmId, kind){
  var btn = $('#'+btnId);
  if (!btn) return;
  btn.addEventListener('click', function(){
    var text = shareText(kind);
    if (navigator.share){
      navigator.share({text: text})['catch'](function(){});
    } else {
      copyShareText(text, $('#'+confirmId));
    }
  });
}
/* ---------- phase router ---------- */
function renderPhase(){
  closeSheet(true);
  document.body.classList.toggle('exhale', S.phase==='debrief' || S.phase==='cta');
  document.body.classList.remove('has-stickybar');
  var old = $('#stickybar'); if (old) old.remove();
  if (S.phase==='intro') renderIntro();
  else if (S.phase==='invest') renderInvest();
  else if (S.phase==='decision') renderDecision();
  else if (S.phase==='boardroom') renderBoardroom();
  else renderDebrief();
  window.scrollTo(0,0);
}
/* ---------- boot ---------- */
S = load() || defState();
var _bootCases = loadProgress().cases, _bootHasProgress = false;
for (var _bk in _bootCases){ if (_bootCases.hasOwnProperty(_bk)){ _bootHasProgress = true; break; } }
if (_bootHasProgress){
  goHub();
} else {
  document.getElementById('sch1').textContent = SC().title;
  renderPhase();
}
</script>

}
